name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Unit and regression tests
      run: pytest tests/ -v

    - name: Validate notebook format
      run: |
        python - <<'EOF'
        import nbformat, sys
        notebooks = ['Summary.ipynb', 'PINN.ipynb', 'Multiphysics.ipynb',
                     'ML.ipynb', 'Symbolic Regression.ipynb', 'Electrode.ipynb',
                     'Electrode_AI.ipynb', 'Electrode_validation.ipynb', 'preliminaries.ipynb']
        bad = 0
        for nb_path in notebooks:
            try:
                nbformat.validate(nbformat.read(nb_path, as_version=4))
                print(f'OK  {nb_path}')
            except Exception as e:
                print(f'FAIL {nb_path}: {e}'); bad += 1
        sys.exit(bad)
        EOF

    - name: Check committed notebooks have no error outputs
      run: |
        python - <<'EOF'
        import nbformat, sys
        notebooks = ['Summary.ipynb', 'PINN.ipynb', 'Multiphysics.ipynb',
                     'ML.ipynb', 'Symbolic Regression.ipynb', 'Electrode.ipynb',
                     'Electrode_AI.ipynb', 'Electrode_validation.ipynb', 'preliminaries.ipynb']
        total = 0
        for nb_path in notebooks:
            nb = nbformat.read(nb_path, as_version=4)
            n = sum(1 for c in nb.cells if c.cell_type == 'code'
                    for o in c.get('outputs', []) if o.get('output_type') == 'error')
            print(f'{nb_path}: {n} error outputs')
            total += n
        sys.exit(1 if total else 0)
        EOF

    - name: Regenerate manuscript figures (smoke test, no hard-coded numbers)
      run: python publication/make_figures.py

  execute-notebooks:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ipykernel

    - name: Execute lightweight notebooks end-to-end
      run: |
        jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=900 preliminaries.ipynb
        jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=900 Summary.ipynb

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check documentation and data files exist
      run: |
        for f in README.md TECHNICAL_GUIDE.md PUBLICATION_METHODS.md CHANGELOG.md \
                 requirements.txt environment.yml \
                 publication/main.tex publication/references.bib \
                 data/raw/gandert2023_calendering.csv \
                 data/raw/separator_electrode_literature.csv \
                 data/raw/steinhardt_18650_unitcell.csv \
                 src/electrode_thermal.py src/zbs_jax.py; do
          if [ -f "$f" ]; then echo "OK  $f"; else echo "MISSING $f"; exit 1; fi
        done
